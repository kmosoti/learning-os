<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}learning-os{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #667085;
        --line: #d9dee7;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --warn: #a16207;
        --ok: #047857;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .app-shell {
        display: grid;
        grid-template-columns: 224px minmax(0, 1fr);
        min-height: 100vh;
      }
      .sidebar {
        border-right: 1px solid var(--line);
        background: #111827;
        color: #f9fafb;
        padding: 18px 14px;
      }
      .brand {
        display: block;
        margin: 0 8px 24px;
        color: #f9fafb;
        font-size: 18px;
        font-weight: 700;
      }
      .nav {
        display: grid;
        gap: 4px;
      }
      .nav a {
        display: block;
        border-radius: 6px;
        color: #d1d5db;
        padding: 9px 10px;
        font-size: 14px;
      }
      .nav a[aria-current="page"] {
        background: #263244;
        color: #ffffff;
      }
      .main {
        padding: 28px;
      }
      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 20px;
      }
      h1, h2, h3, p { margin-top: 0; }
      h1 { font-size: 28px; margin-bottom: 6px; }
      h2 { font-size: 18px; margin-bottom: 12px; }
      h3 { font-size: 15px; margin-bottom: 6px; }
      .muted { color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .panel,
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .stack {
        display: grid;
        gap: 14px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #344054;
        font-size: 13px;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
      }
      textarea {
        min-height: 82px;
        resize: vertical;
      }
      button,
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 650;
        padding: 9px 12px;
        text-decoration: none;
      }
      button:hover,
      .button:hover {
        background: var(--accent-dark);
        text-decoration: none;
      }
      .list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .list a {
        display: block;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        padding: 12px;
      }
      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #f8fafc;
        color: #475467;
        font-size: 12px;
        padding: 3px 9px;
      }
      @media (max-width: 760px) {
        .app-shell { grid-template-columns: 1fr; }
        .sidebar { border-right: 0; }
        .nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .main { padding: 18px; }
        .page-header { display: block; }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="/courses">learning-os</a>
        <nav class="nav" aria-label="Primary">
          <a href="/courses" {% if active_nav == "courses" %}aria-current="page"{% endif %}>Courses</a>
          <a href="#" aria-disabled="true">Today</a>
          <a href="#" aria-disabled="true">Notes</a>
          <a href="#" aria-disabled="true">Quiz</a>
          <a href="#" aria-disabled="true">Map</a>
        </nav>
      </aside>
      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
